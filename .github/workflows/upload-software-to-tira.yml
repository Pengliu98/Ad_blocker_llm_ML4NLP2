name: Upload Software to TIRA
on:
  workflow_dispatch:
    inputs:
      directory:
        description: "The directory that contains the submission. Can be . for the root of the repository"
        required: true
        default: .
jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install required python packages
        run: |
          python -m pip install --upgrade pip
          pip3 install tira

      - name: Build and Upload Task 1 Component
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          tira-cli code-submission \
            --path ${{ inputs.directory }} \
            --task advertisement-in-retrieval-augmented-generation-2026 \
            --dataset advertisement-in-retrieval-augmented-generation-2026/ads-in-rag-task-1-detection-spot-check-20260422-training \
            --command 'python3 /predict.py --dataset $inputDataset/*.jsonl --output $outputDir/run.jsonl --task 1 --model_dir /saved_model_sentence'

      - name: Build and Upload Task 2 Component
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          tira-cli code-submission \
            --path ${{ inputs.directory }} \
            --task advertisement-in-retrieval-augmented-generation-2026 \
            --command 'python3 /predict.py --dataset $inputDataset/*.jsonl --output $outputDir/run.jsonl --task 2 --model_dir /saved_model_sentence'
