name: Upload Software to TIRA
on:
  workflow_dispatch:
    inputs:
      directory:
        description: "The directory that contains the submission. Can be . for the root of the repository"
        required: true
        default: .
jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install required python packages
        run: |
          python -m pip install --upgrade pip
          pip3 install tira
      - name: Upload code to TIRA
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}

          # Upload Task 1 Setup
          tira-cli upload \
            --directory ${{ inputs.directory }} \
            --task advertisement-in-retrieval-augmented-generation-2026 \
            --command 'python3 /predict.py --dataset $inputDataset/*.jsonl --output $outputDir/run.jsonl --task 1'

          # Upload Task 2 Setup
          tira-cli upload \
            --directory ${{ inputs.directory }} \
            --task advertisement-in-retrieval-augmented-generation-2026 \
            --command 'python3 /predict.py --dataset $inputDataset/*.jsonl --output $outputDir/run.jsonl --task 2'
